services:
  - type: web
    name: rancom-technologies
    runtime: docker
    repo: https://github.com/Lightining29/ransom-2.git
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        value: rancom-tech-jwt-secret-2026
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: rancom@2026
      - key: PRODUCTION_DOMAIN
        value: www.rancomtechnologies.com
