services:
  - type: web
    name: rancom-technologies
    runtime: docker
    repo: https://github.com/Lightining29/nayabusiness.git
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        value: rancom-tech-jwt-secret-2026
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: rancom@2026
      - key: PRODUCTION_DOMAIN
        value: www.rancomtechnologies.com
      # Brevo REST API — HTTPS port 443, works on Render (no SMTP port blocking)
      # Set BREVO_API_KEY in Render Dashboard: xkeysib-...
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        value: brayw433@gmail.com
      - key: BREVO_SENDER_NAME
        value: Rancom Technologies
      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Firebase
      - key: FIREBASE_PROJECT_ID
        value: rancom-technologies
      - key: FIREBASE_CLIENT_EMAIL
        value: firebase-adminsdk-fbsvc@rancom-technologies.iam.gserviceaccount.com
      - key: FIREBASE_PRIVATE_KEY_ID
        value: f58b2acfc62bf3bc05963a180c62f7a5c1e212a0
      - key: FIREBASE_CLIENT_ID
        value: "101595837038229513090"
      - key: FIREBASE_PRIVATE_KEY
        sync: false
