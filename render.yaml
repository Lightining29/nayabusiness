services:
  - type: web
    name: rancom-technologies
    runtime: docker
    repo: https://github.com/Lightining29/ransom-2.git
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DNS_SERVERS
        value: 1.1.1.1,8.8.8.8
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        value: rancom-tech-jwt-secret-2026
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: rancom@2026
      - key: PRODUCTION_DOMAIN
        value: www.rancomtechnologies.com
      # Email — Brevo REST API over HTTPS
      # Get key: app.brevo.com → SMTP & API → API Keys. Use xkeysib-..., not SMTP password.
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: Rancom Technologies
      - key: EMAIL_SEND_TIMEOUT_MS
        value: "15000"
      # Email fallbacks — optional
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      # Brevo SMTP fallback. If set, smtp-relay.brevo.com is used before Gmail.
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_FROM_NAME
        value: Rancom Technologies
      - key: GMAIL_REFRESH_TOKEN
        sync: false
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: rancom-technologies
      - key: FIREBASE_CLIENT_EMAIL
        value: firebase-adminsdk-fbsvc@rancom-technologies.iam.gserviceaccount.com
      - key: FIREBASE_PRIVATE_KEY_ID
        value: f58b2acfc62bf3bc05963a180c62f7a5c1e212a0
      - key: FIREBASE_CLIENT_ID
        value: "101595837038229513090"
      - key: FIREBASE_PRIVATE_KEY
        sync: false
